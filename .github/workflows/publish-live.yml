name: Publish Live Site

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-live.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update live pricing copy
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('Full session NPR 750, now special offer NPR 750.', 'Full session NPR 1000, now special offer NPR 750.'),
              ('"priceRange": "NPR 750"', '"priceRange": "NPR 750 - NPR 1000"'),
              ('Full Price NPR 750', 'Full Price NPR 1000'),
              ('पूर्ण शुल्क NPR 750', 'पूर्ण शुल्क NPR 1000'),
              ('full session NPR 750, now special offer NPR 750.', 'full session NPR 1000, now special offer NPR 750.'),
              ('पूर्ण शुल्क NPR ७५०, अहिले विशेष अफर NPR ७५०।', 'पूर्ण शुल्क NPR १०००, अहिले विशेष अफर NPR ७५०।'),
              ('Full price NPR 750 · limited-time special offer', 'Full price NPR 1000 · limited-time special offer'),
              ('पूर्ण शुल्क NPR ७५० · सीमित समय विशेष अफर', 'पूर्ण शुल्क NPR १००० · सीमित समय विशेष अफर'),
              ("offerPrice:'NPR 750',fullPrice:'NPR 750'", "offerPrice:'NPR 750',fullPrice:'NPR 1000'"),
          ]
          for old, new in replacements:
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/publish-live.yml

      - name: Commit site update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/publish-live.yml
          git commit -m "Publish site live with NPR 1000 full price"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
