name: Sync Daily Rashifal

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-rashifal.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish-live-site:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update live pricing copy
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('NRs 300 - NRs 750', 'NPR 750'),
              ('NRs 300', 'NPR 750'),
              ('NRs 750', 'NPR 750'),
              ('NRs ३००', 'NPR ७५०'),
              ('NRs ७५०', 'NPR ७५०'),
          ]
          for old, new in replacements:
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit site update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "No site changes to commit."
          else
            git add index.html
            git commit -m "Publish site live with NPR 750 pricing"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-rashifal:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest rashifal data
        run: python3 scripts/sync_rashifal.py

      - name: Commit updated rashifal snapshot
        run: |
          if git diff --quiet -- data/rashifal.json; then
            echo "No rashifal changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rashifal.json
          git commit -m "Update daily rashifal data"
          git push
