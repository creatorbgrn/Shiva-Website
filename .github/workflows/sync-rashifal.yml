name: Sync Daily Rashifal

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-rashifal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest rashifal data
        run: python3 scripts/sync_rashifal.py

      - name: Commit updated rashifal snapshot
        run: |
          if git diff --quiet -- data/rashifal.json; then
            echo "No rashifal changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rashifal.json
          git commit -m "Update daily rashifal data"
          git push
